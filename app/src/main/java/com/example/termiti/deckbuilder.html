<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termiti – Deck Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --surface: #181410;
    --panel: #1f1a14;
    --border: #3a2e1e;
    --border-light: #4a3d28;
    --text: #e8dcc8;
    --text-dim: #8a7a60;
    --text-muted: #5a4e38;
    --gold: #c9963a;
    --gold-light: #e8b85a;
    --gold-dim: #7a5a20;
    --attack: #c0392b;
    --attack-dim: #5a1a14;
    --attack-bg: #1e0e0c;
    --stones: #5d8a3c;
    --stones-dim: #2a4a18;
    --stones-bg: #0e150a;
    --magic: #6a4fa8;
    --magic-dim: #3a2464;
    --magic-bg: #100c1a;
    --chaos: #c06030;
    --chaos-dim: #603010;
    --chaos-bg: #180e08;
    --common: #8a7a60;
    --rare: #5a8ac0;
    --epic: #8a4ab0;
    --legendary: #c09030;
    --ok: #5d8a3c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 15px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    white-space: nowrap;
  }
  header .subtitle { color: var(--text-dim); font-style: italic; font-size: 12px; }

  .header-center { display: flex; align-items: center; gap: 8px; flex: 1; }

  /* Source load button */
  .btn-load-src {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 12px;
    border: 1px solid var(--border-light);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn-load-src:hover { border-color: var(--gold-dim); color: var(--gold); }

  .card-source-info {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
    white-space: nowrap;
  }
  .card-source-info.loaded { color: var(--ok); }

  .deck-tabs { display: flex; gap: 6px; margin-left: auto; }
  .deck-tab {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 5px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
  }
  .deck-tab:hover { border-color: var(--gold-dim); color: var(--text); }
  .deck-tab.active { border-color: var(--gold); color: var(--gold); background: rgba(201,150,58,.08); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 1fr 310px;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left: card browser ── */
  .browser {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .filters {
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    flex-shrink: 0;
  }

  .filters input[type=text] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    width: 160px;
    outline: none;
  }
  .filters input[type=text]::placeholder { color: var(--text-muted); }
  .filters input[type=text]:focus { border-color: var(--gold-dim); }

  .filter-btn {
    padding: 3px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    transition: all .12s;
    white-space: nowrap;
  }
  .filter-btn:hover { color: var(--text); border-color: var(--border-light); }
  .filter-btn.active-all    { border-color: var(--gold-dim); color: var(--gold); }
  .filter-btn.active-attack { border-color: var(--attack); color: var(--attack); background: var(--attack-bg); }
  .filter-btn.active-stones { border-color: var(--stones); color: var(--stones); background: var(--stones-bg); }
  .filter-btn.active-magic  { border-color: var(--magic);  color: var(--magic);  background: var(--magic-bg); }
  .filter-btn.active-chaos  { border-color: var(--chaos);  color: var(--chaos);  background: var(--chaos-bg); }

  .sort-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 8px;
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    margin-left: auto;
  }

  .card-grid {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(172px, 1fr));
    gap: 6px;
    align-content: start;
  }
  .card-grid::-webkit-scrollbar { width: 6px; }
  .card-grid::-webkit-scrollbar-track { background: var(--bg); }
  .card-grid::-webkit-scrollbar-thumb { background: var(--border); }

  /* ── Card tile ── */
  .card-tile {
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 7px 9px;
    cursor: pointer;
    transition: all .12s;
    position: relative;
    user-select: none;
  }
  .card-tile:hover { border-color: var(--gold-dim); background: #231d16; }
  .card-tile.in-deck { border-color: var(--gold-dim); }
  .card-tile.maxed { opacity: .45; cursor: not-allowed; }

  .card-tile-header {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 4px;
  }
  .cost-badge {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    min-width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid;
    flex-shrink: 0;
  }
  .cost-attack { color: var(--attack); border-color: var(--attack-dim); background: var(--attack-bg); }
  .cost-stones { color: var(--stones); border-color: var(--stones-dim); background: var(--stones-bg); }
  .cost-magic  { color: var(--magic);  border-color: var(--magic-dim);  background: var(--magic-bg); }
  .cost-chaos  { color: var(--chaos);  border-color: var(--chaos-dim);  background: var(--chaos-bg); }

  .card-name {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.3;
    color: var(--text);
    flex: 1;
  }
  .card-desc {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.4;
    margin-bottom: 5px;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .rarity-dot {
    font-size: 11px;
    font-family: 'Cinzel', serif;
    letter-spacing: .5px;
  }
  .r-common    { color: var(--common); }
  .r-rare      { color: var(--rare); }
  .r-epic      { color: var(--epic); }
  .r-legendary { color: var(--legendary); }

  .combo-tag {
    font-size: 10px;
    color: var(--gold-dim);
    border: 1px solid var(--gold-dim);
    padding: 1px 4px;
    letter-spacing: .5px;
  }

  .count-indicator {
    position: absolute;
    top: 4px; right: 6px;
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  /* ── Right: deck panel ── */
  .deck-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }

  .deck-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .deck-header-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .deck-header h2 {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    color: var(--gold);
  }
  .deck-name-input {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    color: var(--gold);
    background: rgba(201,150,58,.08);
    border: 1px solid var(--gold-dim);
    padding: 1px 6px;
    outline: none;
    width: 160px;
  }
  .deck-name-input:focus { border-color: var(--gold); }
  .deck-count {
    font-size: 13px;
    color: var(--text-dim);
    margin-left: auto;
    white-space: nowrap;
  }
  .deck-count span {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 700;
  }
  .deck-count .cnt-num { color: var(--gold); }
  .deck-count .cnt-max { color: var(--text-muted); }

  .progress-bar {
    height: 3px;
    background: var(--border);
    margin-top: 6px;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width .2s;
  }
  .progress-fill.full { background: #c03030; }

  .deck-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .deck-list::-webkit-scrollbar { width: 4px; }
  .deck-list::-webkit-scrollbar-thumb { background: var(--border); }

  .deck-entry {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    border-bottom: 1px solid #1c1812;
    transition: background .1s;
  }
  .deck-entry:hover { background: #231d16; }

  .de-cost {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }
  .de-name { flex: 1; font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .de-count-ctrl {
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
  }
  .de-btn {
    width: 18px; height: 18px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: all .1s;
  }
  .de-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .de-cnt {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--gold);
    min-width: 14px;
    text-align: center;
  }

  /* ── Output ── */
  .deck-output {
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    flex-shrink: 0;
  }
  .output-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 5px;
  }
  .output-box {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 6px 8px;
    font-family: 'Courier New', monospace;
    font-size: 10.5px;
    color: var(--gold-light);
    min-height: 54px;
    max-height: 90px;
    overflow-y: auto;
    margin-bottom: 6px;
    line-height: 1.55;
    white-space: pre;
  }

  .action-row { display: flex; gap: 6px; }
  .btn-copy, .btn-clear {
    flex: 1;
    padding: 7px 8px;
    border: 1px solid;
    background: transparent;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 1px;
    transition: all .12s;
  }
  .btn-copy  { border-color: var(--gold-dim); color: var(--gold); }
  .btn-copy:hover  { background: rgba(201,150,58,.12); border-color: var(--gold); }
  .btn-clear { border-color: var(--border); color: var(--text-muted); }
  .btn-clear:hover { border-color: #c03030; color: #c03030; }

  .copy-toast {
    font-size: 11px;
    color: var(--ok);
    text-align: center;
    height: 14px;
    line-height: 14px;
    margin-top: 3px;
  }

  /* ── Stats bar ── */
  .stats-bar {
    border-top: 1px solid var(--border);
    padding: 5px 12px;
    display: flex;
    gap: 10px;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .stat { display: flex; align-items: center; gap: 4px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* ── No cards notice ── */
  .no-cards-notice {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-muted);
    font-style: italic;
    text-align: center;
    padding: 20px;
  }
  .no-cards-notice button {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 8px 20px;
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
  }
  .no-cards-notice button:hover { background: rgba(201,150,58,.1); }

  /* ── Scrollbar global ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  #fileInput { display: none; }

  /* ── Card preview tooltip ── */
  #card-preview {
    position: fixed;
    display: none;
    z-index: 9999;
    width: 230px;
    background: var(--panel);
    border: 1px solid var(--gold-dim);
    box-shadow: 0 10px 32px rgba(0,0,0,.7);
    padding: 12px 14px;
    pointer-events: none;
  }
  #card-preview.visible { display: block; }
  #card-preview .pvw-header {
    display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px;
  }
  #card-preview .pvw-cost {
    font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700;
    min-width: 24px; height: 24px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid;
  }
  #card-preview .pvw-name {
    font-family: 'Cinzel', serif; font-weight: 600; font-size: 13px;
    line-height: 1.3; color: var(--text);
  }
  #card-preview .pvw-desc {
    font-style: italic; font-size: 12px; color: var(--text-dim);
    line-height: 1.5; margin-bottom: 8px; white-space: normal;
  }
  #card-preview .pvw-footer {
    font-size: 11px; color: var(--text-muted);
    display: flex; justify-content: space-between; align-items: center;
  }
  #card-preview .pvw-combo {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    color: var(--gold); border: 1px solid var(--gold-dim);
    padding: 1px 5px;
  }
</style>
</head>
<body>

<input type="file" id="fileInput" accept=".kt" onchange="loadKtFile(event)">

<div id="card-preview">
  <div class="pvw-header">
    <div class="pvw-cost" id="pvw-cost"></div>
    <div class="pvw-name" id="pvw-name"></div>
  </div>
  <div class="pvw-desc" id="pvw-desc"></div>
  <div class="pvw-footer">
    <span id="pvw-rarity"></span>
    <span class="pvw-combo" id="pvw-combo"></span>
  </div>
</div>

<header>
  <div>
    <h1>⚔ TERMITI DECK BUILDER</h1>
    <div class="subtitle">Max 30 karet · 3 balíčky</div>
  </div>

  <div class="header-center">
    <button class="btn-load-src" onclick="document.getElementById('fileInput').click()">
      📂 Načíst Gameviewmodel.kt
    </button>
    <span class="card-source-info" id="sourceInfo">výchozí karty</span>
  </div>

  <div class="deck-tabs" id="deckTabs">
    <button class="deck-tab active" onclick="switchDeck(0)">BALÍČEK 1</button>
    <button class="deck-tab" onclick="switchDeck(1)">BALÍČEK 2</button>
    <button class="deck-tab" onclick="switchDeck(2)">BALÍČEK 3</button>
  </div>
</header>

<div class="layout">
  <!-- LEFT: browser -->
  <div class="browser">
    <div class="filters">
      <input type="text" id="searchInput" placeholder="Hledat kartu..." oninput="render()">
      <button class="filter-btn active-all" id="fbAll"    onclick="setFilter('ALL')">Vše</button>
      <button class="filter-btn" id="fbATTACK" onclick="setFilter('ATTACK')">⚔ Útok</button>
      <button class="filter-btn" id="fbSTONES" onclick="setFilter('STONES')">🏰 Stavba</button>
      <button class="filter-btn" id="fbMAGIC"  onclick="setFilter('MAGIC')">✦ Magie</button>
      <button class="filter-btn" id="fbCHAOS"  onclick="setFilter('CHAOS')">🌀 Chaos</button>
      <select class="sort-select" id="sortSelect" onchange="render()">
        <option value="cost">Řadit: cena ↑</option>
        <option value="type">Řadit: typ</option>
        <option value="cost-desc">Řadit: cena ↓</option>
        <option value="name">Řadit: název</option>
        <option value="rarity">Řadit: raritu</option>
      </select>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <!-- RIGHT: deck -->
  <div class="deck-panel">
    <div class="deck-header">
      <div class="deck-header-row">
        <input class="deck-name-input" id="deckNameInput" value="BALÍČEK 1"
               oninput="renameDeck(this.value)" onblur="renameDeck(this.value)">
        <div class="deck-count">
          <span class="cnt-num" id="deckCountNum">0</span><span class="cnt-max">/30</span>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="deck-list" id="deckList"></div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="deck-output">
      <span class="output-label">KOTLIN KÓD (vložit do presetTemplates v GameViewModel)</span>
      <div class="output-box" id="outputBox">—</div>
      <div class="action-row">
        <button class="btn-copy" onclick="copyCode()">KOPÍROVAT KÓD</button>
        <button class="btn-clear" onclick="clearDeck()">VYMAZAT</button>
      </div>
      <div class="copy-toast" id="copyToast"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// Default cards (fallback when Gameviewmodel.kt not loaded)
// ══════════════════════════════════════════════════════════════════════════════
const DEFAULT_CARDS = [
  {id:"001",name:"Základní útok",  desc:"Zaútočí na nepřítele za 5.",             cost:2,type:"ATTACK",rarity:"COMMON",combo:false},
  {id:"008",name:"Šípy",           desc:"Zaútočí na nepřítele za 3.",             cost:1,type:"ATTACK",rarity:"COMMON",combo:false},
  {id:"003",name:"Ohnivá koule",   desc:"Zaútočí na nepřítele za 6.",             cost:3,type:"ATTACK",rarity:"COMMON",combo:false},
  {id:"007",name:"Katapult",       desc:"Zaútočí na nepřítele za 10.",            cost:5,type:"ATTACK",rarity:"RARE",combo:false},
  {id:"006",name:"Podmíněný útok", desc:"Pokud máš >5 útoku, udeř za 10.",       cost:3,type:"ATTACK",rarity:"RARE",combo:false},
  {id:"017",name:"Válečný sekyrník",desc:"Zaútočí na nepřítele za 7.",           cost:4,type:"ATTACK",rarity:"COMMON",combo:false},
  {id:"019",name:"Zápalné šípy",   desc:"Poškodí jen hradby o 4.",               cost:1,type:"ATTACK",rarity:"COMMON",combo:false},
  {id:"020",name:"Beranidlo",      desc:"Poškodí jen hradby o 8.",               cost:3,type:"ATTACK",rarity:"RARE",combo:false},
  {id:"021",name:"Dělostřelectvo", desc:"Zaútočí na nepřítele za 18.",            cost:6,type:"ATTACK",rarity:"EPIC",combo:false},
  {id:"022",name:"Přímý zásah",    desc:"Přímý zásah: hrad −8, ignoruje hradby.",cost:3,type:"ATTACK",rarity:"RARE",combo:false},
  {id:"023",name:"Dvojitý úder",   desc:"Zaútočí na nepřítele za 12.",            cost:5,type:"ATTACK",rarity:"EPIC",combo:false},
  {id:"024",name:"Berserk",        desc:"Pokud máš <5 hradeb, udeř hrad za 15.", cost:4,type:"ATTACK",rarity:"RARE",combo:false},
  {id:"025",name:"Protiútok",      desc:"Pokud máš <10 hradeb, udeř hrad za 10.",cost:3,type:"ATTACK",rarity:"RARE",combo:false},

const MAX_COPIES = { COMMON: 4, RARE: 3, EPIC: 2, LEGENDARY: 1 };

// ══════════════════════════════════════════════════════════════════════════════
// Card source (default or parsed from .kt)
// ══════════════════════════════════════════════════════════════════════════════
let CARDS = DEFAULT_CARDS;
let CARD_MAP = buildMap(CARDS);
let cardSourceLabel = 'výchozí karty';

function buildMap(cards) {
  return Object.fromEntries(cards.map(c => [c.id, c]));
}

// Try to restore parsed cards from localStorage
(function restoreFromStorage() {
  try {
    const saved = localStorage.getItem('termiti_cards');
    const label = localStorage.getItem('termiti_cards_label');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed && parsed.length > 0) {
        CARDS = parsed;
        CARD_MAP = buildMap(CARDS);
        cardSourceLabel = label || 'uložené karty';
      }
    }
  } catch(e) {}
})();

// ══════════════════════════════════════════════════════════════════════════════
// Parse Gameviewmodel.kt
// ══════════════════════════════════════════════════════════════════════════════
function parseKotlinCards(src) {
  const cards = [];
  // Split on Card( to get each card's argument block
  const parts = src.split(/\bCard\s*\(/);
  for (let i = 1; i < parts.length; i++) {
    const chunk = parts[i];
    // Extract positional string args: id, name, description
    const strArgs = [];
    let pos = 0;
    while (strArgs.length < 3 && pos < chunk.length) {
      const q = chunk.indexOf('"', pos);
      if (q === -1) break;
      const q2 = chunk.indexOf('"', q + 1);
      if (q2 === -1) break;
      strArgs.push(chunk.slice(q + 1, q2));
      pos = q2 + 1;
    }
    if (strArgs.length < 2) continue;

    const costM   = chunk.match(/\bcost\s*=\s*(\d+)/);
    const typeM   = chunk.match(/costType\s*=\s*ResourceType\.(\w+)/);
    const rarityM = chunk.match(/rarity\s*=\s*Rarity\.(\w+)/);
    const comboM  = chunk.match(/isCombo\s*=\s*(true)/);

    if (!costM || !typeM || !rarityM) continue;

    cards.push({
      id:    strArgs[0],
      name:  strArgs[1],
      desc:  strArgs[2] || '',
      cost:  parseInt(costM[1]),
      type:  typeM[1],
      rarity: rarityM[1],
      combo: !!comboM
    });
  }
  return cards;
}

function loadKtFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const src = e.target.result;
    const parsed = parseKotlinCards(src);
    if (parsed.length === 0) {
      alert('Nepodařilo se najít žádné karty v souboru.\nUjisti se, že jsi vybral Gameviewmodel.kt.');
      return;
    }
    CARDS   = parsed;
    CARD_MAP = buildMap(CARDS);
    cardSourceLabel = file.name + ' (' + parsed.length + ' karet)';
    // Save to localStorage for next session
    try {
      localStorage.setItem('termiti_cards', JSON.stringify(CARDS));
      localStorage.setItem('termiti_cards_label', cardSourceLabel);
    } catch(e) {}
    updateSourceInfo();
    render();
    renderDeck();
  };
  reader.readAsText(file, 'UTF-8');
  event.target.value = ''; // allow re-selecting same file
}

function updateSourceInfo() {
  const el = document.getElementById('sourceInfo');
  const isDefault = CARDS === DEFAULT_CARDS || cardSourceLabel === 'výchozí karty';
  el.textContent  = cardSourceLabel;
  el.className    = 'card-source-info' + (isDefault ? '' : ' loaded');
}

// ══════════════════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════════════════
// Each deck: { cards: {id: count}, name: string }
const decks = [
  { cards: {}, name: 'Balíček 1' },
  { cards: {}, name: 'Balíček 2' },
  { cards: {}, name: 'Balíček 3' },
];
let activeDeck = 0;
let filterType = 'ALL';

function deckTotal(d) { return Object.values(decks[d].cards).reduce((a,b)=>a+b, 0); }

function switchDeck(i) {
  activeDeck = i;
  document.querySelectorAll('.deck-tab').forEach((t,j) => t.classList.toggle('active', j===i));
  document.getElementById('deckNameInput').value = decks[i].name;
  renderDeck();
  render();
}

function renameDeck(val) {
  const name = val.trim() || ('Balíček ' + (activeDeck + 1));
  decks[activeDeck].name = name;
  const tabs = document.querySelectorAll('.deck-tab');
  tabs[activeDeck].textContent = name.toUpperCase().slice(0, 18);
}

function setFilter(t) {
  filterType = t;
  ['ALL','ATTACK','STONES','MAGIC','CHAOS'].forEach(f => {
    const btn = document.getElementById('fb'+f);
    btn.className = 'filter-btn' + (f===t ? ' active-'+f.toLowerCase() : '');
  });
  render();
}

function addCard(id) {
  const card = CARD_MAP[id];
  if (!card) return;
  const cur = decks[activeDeck].cards[id] || 0;
  const max = MAX_COPIES[card.rarity];
  if (cur >= max) return;
  if (deckTotal(activeDeck) >= 30) return;
  decks[activeDeck].cards[id] = cur + 1;
  renderDeck();
  render();
}

function setCount(id, delta) {
  const cur = decks[activeDeck].cards[id] || 0;
  const next = cur + delta;
  if (next <= 0) {
    delete decks[activeDeck].cards[id];
  } else {
    const card = CARD_MAP[id];
    if (!card) return;
    if (next > MAX_COPIES[card.rarity]) return;
    if (delta > 0 && deckTotal(activeDeck) >= 30) return;
    decks[activeDeck].cards[id] = next;
  }
  renderDeck();
  render();
}

function clearDeck() {
  decks[activeDeck].cards = {};
  renderDeck();
  render();
}

// ══════════════════════════════════════════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════════════════════════════════════════
function typeColor(t) {
  return {ATTACK:'var(--attack)',STONES:'var(--stones)',MAGIC:'var(--magic)',CHAOS:'var(--chaos)'}[t]||'var(--text-dim)';
}
function typeCostClass(t) {
  return {ATTACK:'cost-attack',STONES:'cost-stones',MAGIC:'cost-magic',CHAOS:'cost-chaos'}[t]||'';
}
function rarityClass(r) {
  return {COMMON:'r-common',RARE:'r-rare',EPIC:'r-epic',LEGENDARY:'r-legendary'}[r]||'r-common';
}
function rarityLabel(r) {
  return {COMMON:'●',RARE:'◆',EPIC:'★',LEGENDARY:'✦'}[r]||'●';
}

function sortedCards() {
  const q    = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort = document.getElementById('sortSelect').value;
  let list = CARDS.filter(c => {
    if (filterType !== 'ALL' && c.type !== filterType) return false;
    if (q && !c.name.toLowerCase().includes(q) && !c.desc.toLowerCase().includes(q)) return false;
    return true;
  });
  const typeOrder = {ATTACK:0,STONES:1,MAGIC:2,CHAOS:3};
  const rarOrder  = {COMMON:0,RARE:1,EPIC:2,LEGENDARY:3};
  if      (sort==='cost')      list.sort((a,b)=>a.cost-b.cost||a.name.localeCompare(b.name,'cs'));
  else if (sort==='cost-desc') list.sort((a,b)=>b.cost-a.cost||a.name.localeCompare(b.name,'cs'));
  else if (sort==='name')      list.sort((a,b)=>a.name.localeCompare(b.name,'cs'));
  else if (sort==='rarity')    list.sort((a,b)=>rarOrder[b.rarity]-rarOrder[a.rarity]||a.cost-b.cost);
  else                         list.sort((a,b)=>typeOrder[a.type]-typeOrder[b.type]||a.cost-b.cost);
  return list;
}

// ══════════════════════════════════════════════════════════════════════════════
// Render catalog
// ══════════════════════════════════════════════════════════════════════════════
// ── Card preview tooltip ──────────────────────────────────────────────────────
function showPreview(id, event) {
  const c = CARD_MAP[id]; if (!c) return;
  const typeClass = typeCostClass(c.type);
  const colMap = { 'cost-attack': 'var(--attack)', 'cost-stones': 'var(--stones)',
                   'cost-magic': 'var(--magic)', 'cost-chaos': 'var(--chaos)' };
  const col = colMap[typeClass] || 'var(--text)';
  const borderMap = { 'cost-attack': 'var(--attack-dim)', 'cost-stones': 'var(--stones-dim)',
                      'cost-magic': 'var(--magic-dim)', 'cost-chaos': 'var(--chaos-dim)' };
  const brd = borderMap[typeClass] || 'var(--border)';
  const bgMap  = { 'cost-attack': 'var(--attack-bg)', 'cost-stones': 'var(--stones-bg)',
                   'cost-magic': 'var(--magic-bg)', 'cost-chaos': 'var(--chaos-bg)' };
  const bg = bgMap[typeClass] || 'var(--panel)';
  document.getElementById('pvw-cost').textContent  = c.cost;
  document.getElementById('pvw-cost').style.color  = col;
  document.getElementById('pvw-cost').style.borderColor = brd;
  document.getElementById('pvw-cost').style.background  = bg;
  document.getElementById('pvw-name').textContent  = c.name;
  document.getElementById('pvw-desc').textContent  = c.desc;
  document.getElementById('pvw-rarity').textContent = rarityLabel(c.rarity) + ' ' + c.rarity;
  document.getElementById('pvw-rarity').style.color = `var(--${c.rarity.toLowerCase()})`;
  const comboEl = document.getElementById('pvw-combo');
  comboEl.textContent = c.combo ? 'COMBO' : '';
  comboEl.style.display = c.combo ? '' : 'none';
  positionPreview(event);
  document.getElementById('card-preview').classList.add('visible');
}
function hidePreview() {
  document.getElementById('card-preview').classList.remove('visible');
}
function positionPreview(event) {
  const el = document.getElementById('card-preview');
  const W = window.innerWidth, H = window.innerHeight;
  const pw = 246, ph = 140;
  let x = event.clientX + 18, y = event.clientY + 18;
  if (x + pw > W - 8) x = event.clientX - pw - 8;
  if (y + ph > H - 8) y = event.clientY - ph - 8;
  el.style.left = Math.max(4, x) + 'px';
  el.style.top  = Math.max(4, y) + 'px';
}
document.addEventListener('mousemove', e => {
  const el = document.getElementById('card-preview');
  if (el.classList.contains('visible')) positionPreview(e);
});

function render() {
  const grid  = document.getElementById('cardGrid');
  const d     = decks[activeDeck].cards;
  const total = deckTotal(activeDeck);
  grid.innerHTML = sortedCards().map(c => {
    const cnt  = d[c.id] || 0;
    const max  = MAX_COPIES[c.rarity];
    const full = cnt >= max || total >= 30;
    return `<div class="card-tile${cnt>0?' in-deck':''}${full&&cnt===0?' maxed':''}"
      onclick="addCard('${c.id}')"
      onmouseenter="showPreview('${c.id}',event)"
      onmouseleave="hidePreview()">
      ${cnt>0?`<div class="count-indicator">×${cnt}</div>`:''}
      <div class="card-tile-header">
        <div class="cost-badge ${typeCostClass(c.type)}">${c.cost}</div>
        <div class="card-name">${c.name}</div>
      </div>
      <div class="card-desc">${c.desc}</div>
      <div class="card-footer">
        <span class="rarity-dot ${rarityClass(c.rarity)}">${rarityLabel(c.rarity)} ${c.rarity}</span>
        ${c.combo?'<span class="combo-tag">COMBO</span>':''}
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════════════════════════
// Render deck panel
// ══════════════════════════════════════════════════════════════════════════════
function renderDeck() {
  const d     = decks[activeDeck].cards;
  const total = deckTotal(activeDeck);

  document.getElementById('deckCountNum').textContent = total;
  const fill = document.getElementById('progressFill');
  fill.style.width = (total/30*100)+'%';
  fill.className   = 'progress-fill' + (total>=30?' full':'');

  const typeOrder = {ATTACK:0,STONES:1,MAGIC:2,CHAOS:3};
  const entries = Object.entries(d)
    .map(([id,cnt])=>({card:CARD_MAP[id],cnt}))
    .filter(x=>x.card)
    .sort((a,b)=>typeOrder[a.card.type]-typeOrder[b.card.type]||a.card.cost-b.card.cost);

  document.getElementById('deckList').innerHTML = entries.length===0
    ? `<div style="padding:20px;color:var(--text-muted);font-style:italic;font-size:13px;text-align:center;">Klikněte na karty vlevo pro přidání</div>`
    : entries.map(({card,cnt})=>`
      <div class="deck-entry" onmouseenter="showPreview('${card.id}',event)" onmouseleave="hidePreview()">
        <div class="de-cost" style="color:${typeColor(card.type)}">${card.cost}</div>
        <div class="de-name">${card.name}</div>
        <div class="de-count-ctrl">
          <button class="de-btn" onclick="event.stopPropagation();setCount('${card.id}',-1)">−</button>
          <div class="de-cnt">${cnt}</div>
          <button class="de-btn" onclick="event.stopPropagation();setCount('${card.id}',1)">+</button>
        </div>
      </div>`).join('');

  // Stats
  const tc = {ATTACK:0,STONES:0,MAGIC:0,CHAOS:0};
  entries.forEach(({card,cnt})=>{ tc[card.type]=(tc[card.type]||0)+cnt; });
  document.getElementById('statsBar').innerHTML = [
    ['#c03030','⚔',tc.ATTACK],
    ['#5d8a3c','🏰',tc.STONES],
    ['#6a4fa8','✦',tc.MAGIC],
    ['#c06030','🌀',tc.CHAOS],
  ].map(([col,icon,n])=>`<span class="stat"><span class="stat-dot" style="background:${col}"></span>${icon} ${n}</span>`).join('');

  // Kotlin export
  renderKotlinCode(entries);
}

// ══════════════════════════════════════════════════════════════════════════════
// Kotlin code export
// ══════════════════════════════════════════════════════════════════════════════
function renderKotlinCode(entries) {
  const box = document.getElementById('outputBox');
  if (entries.length === 0) { box.textContent = '—'; return; }

  const name = decks[activeDeck].name;
  // Format: ready to paste into presetTemplates list in GameViewModel
  const lines = entries.map(({card,cnt}) => {
    const padding = ' '.repeat(Math.max(0, 5 - card.id.length));
    return `        "${card.id}"${padding} to ${cnt},   // ${card.name}`;
  });

  const total = entries.reduce((s,e)=>s+e.cnt, 0);
  const code =
`    "${name}" to mapOf(\n` +
lines.join('\n') + '\n' +
`    ),  // ${total} karet`;

  box.textContent = code;
}

function copyCode() {
  const code = document.getElementById('outputBox').textContent;
  if (!code || code==='—') return;
  navigator.clipboard.writeText(code).then(()=>{
    const t = document.getElementById('copyToast');
    t.textContent = '✓ Zkopírováno!';
    setTimeout(()=>t.textContent='', 2200);
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════════════════════════════
updateSourceInfo();
render();
renderDeck();
</script>
